endings:
  - id: best_ending
    title: Мудрец города
    background_color: "#2E4A1E"
    text: >
      Семь дней пролетели как один. Город N изменился -- и вы вместе
      с ним. Люди, которые поначалу смотрели на вас с недоверием,
      теперь приходят не только за советом, но и просто поговорить.

      Фермеры делятся урожаем, стражники кивают с уважением,
      а дети бегут навстречу с криками "Мудрец идёт!". Ваша
      библиотека стала сердцем города -- местом, где ищут не
      только знания, но и надежду.

      Из Академии пришло письмо: вас приглашают остаться в городе N
      на постоянной основе. Вы улыбаетесь -- вы и не думали уезжать.

  - id: neutral_ending
    title: Странник
    background_color: "#3A3A2E"
    text: >
      Семь дней прошли. Город N выстоял -- но едва ли благодаря
      вам одному. Некоторые советы оказались удачными, другие --
      не очень. Горожане относятся к вам с осторожным уважением,
      но без особого тепла.

      Из Академии пришло письмо: вас переводят в другой город.
      "Опыт получен," -- написал наставник. Вы собираете вещи,
      оглядывая библиотеку в последний раз. Может быть, в
      следующем городе получится лучше.

  - id: city_falls
    title: Упадок
    background_color: "#3A2A1A"
    text: >
      Город N трещит по швам. Рынок опустел, стража деморализована,
      храм закрыл двери. Ваши советы, данные без должных знаний
      или с плохим расчётом, привели к цепочке бед.

      Из Академии прибыл ревизор. Осмотрев город, он покачал
      головой. "Мы отзываем вас. Городу нужен более опытный
      мудрец." Вы уезжаете под молчаливые взгляды горожан,
      унося с собой горький урок.

  - id: burned
    title: Костёр невежества
    background_color: "#4A1A1A"
    text: >
      Толпа собралась у библиотеки на рассвете. Крики "Шарлатан!"
      и "Он погубил город!" разносились по улицам. Стража
      отвернулась -- они тоже потеряли веру в вашу мудрость.

      Вас изгнали из города под улюлюканье. Книги, которые вы
      не успели спрятать, бросили в костёр на площади. Дым
      поднимался к небу, унося с собой знания, которые могли
      бы спасти этих людей -- если бы они только послушали.

      Но, может быть, вы и сами виноваты. Мудрость -- это не
      только знания из книг, но и умение понять тех, кому
      советуешь.
